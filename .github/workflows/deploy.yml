name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm run build
        env:
          PUBLIC_CF_BEACON_TOKEN: af05e4e8cf9b48d9983efeca4ed74ed2
          PUBLIC_AMAZON_TAG_US: taekm33-20
          PUBLIC_AMAZON_TAG_JP: taekm33-22
          PUBLIC_AMAZON_TAG_UK: taekm33-21
          PUBLIC_AMAZON_TAG_CA: taekm330a-20
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=greenlivingtrend-org --branch=main